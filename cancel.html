<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago cancelado — Linca</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 4px 24px rgba(239,68,68,0.08);
        }
        .icon-circle {
            width: 80px; height: 80px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
        }
        .icon-circle .material-icons { font-size: 40px; color: #dc2626; }
        h1 { font-size: 24px; color: #1f2937; margin-bottom: 8px; }
        p { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #7c3aed;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background: #6d28d9; }
        .btn-secondary {
            display: inline-block;
            margin-top: 12px;
            padding: 14px 32px;
            background: white;
            color: #7c3aed;
            border: 1.5px solid #7c3aed;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: #f5f0ff; }
        .btns { display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-circle">
            <span class="material-icons">cancel</span>
        </div>
        <h1>Pago cancelado</h1>
        <p>No se realizó ningún cargo. Puedes volver a intentarlo cuando quieras.</p>
        <div class="btns">
            <a href="javascript:history.back()" class="btn">Volver al producto</a>
            <a href="index.html" class="btn-secondary">Ir a Linca</a>
        </div>
    </div>
</body>
</html>
