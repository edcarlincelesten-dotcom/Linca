<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconectando — Linca</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#fef3c7; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:white; border-radius:20px; padding:48px 40px; text-align:center; max-width:420px; width:90%; }
        .icon-circle { width:80px; height:80px; background:#fef3c7; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
        .icon-circle .material-icons { font-size:40px; color:#d97706; }
        h1 { font-size:24px; color:#1f2937; margin-bottom:8px; }
        p { color:#6b7280; font-size:15px; line-height:1.6; margin-bottom:24px; }
        .btn { display:inline-block; padding:14px 32px; background:#7c3aed; color:white; border-radius:10px; text-decoration:none; font-size:15px; font-weight:600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-circle">
            <span class="material-icons">refresh</span>
        </div>
        <h1>Enlace expirado</h1>
        <p>El enlace de configuración expiró. Vuelve a Linca e intenta conectar tu cuenta de nuevo.</p>
        <a href="index.html" class="btn">Volver a Linca</a>
    </div>
</body>
</html>
