<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago exitoso — Linca</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 4px 24px rgba(124,58,237,0.1);
        }
        .icon-circle {
            width: 80px; height: 80px;
            background: #d1fae5;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
        }
        .icon-circle .material-icons { font-size: 40px; color: #059669; }
        h1 { font-size: 24px; color: #1f2937; margin-bottom: 8px; }
        .product-name {
            font-size: 16px; font-weight: 600;
            color: #7c3aed; margin-bottom: 8px;
        }
        p { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #7c3aed;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background: #6d28d9; }
        .session-id {
            margin-top: 20px;
            font-size: 11px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-circle">
            <span class="material-icons">check_circle</span>
        </div>
        <h1>¡Pago exitoso!</h1>
        <div class="product-name" id="productName"></div>
        <p>Tu compra se ha procesado correctamente. Gracias por usar Linca 🎉</p>
        <a href="index.html" class="btn">Volver a Linca</a>
        <div class="session-id" id="sessionId"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const product = params.get('product');
        const sessionId = params.get('session_id');

        if (product) {
            document.getElementById('productName').textContent = decodeURIComponent(product);
        }
        if (sessionId) {
            document.getElementById('sessionId').textContent = `ID: ${sessionId}`;
        }
    </script>
</body>
</html>
